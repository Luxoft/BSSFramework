name: Integration tests

on:
  push:
    branches:
      - "main"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Configure git
        run: git config --global core.autocrlf true

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Prepare SQL Server data folder
        run: |
          sudo mkdir -p /var/opt/mssql
          sudo chmod -R 777 /var/opt/mssql

      - name: Run SQL Server container
        run: |
          docker run -d \
            -e "ACCEPT_EULA=Y" \
            -e "MSSQL_SA_PASSWORD=P@ssw0rd" \
            -e "MSSQL_PID=Express" \
            -v /var/opt/mssql:/var/opt/mssql \
            -p 1433:1433 \
            --name sqlexpress \
            mcr.microsoft.com/mssql/server:2019-latest

          docker exec sqlexpress chown -R 10001:0 /var/opt/mssql

      - name: Wait for SQL Server
        run: |
          for i in {1..30}; do
            nc -z localhost 1433 && echo "SQL Server is up" && exit 0
            sleep 2
          done
          echo "SQL Server did not start in time"
          docker logs sqlexpress
          exit 1

      - name: Restore dependencies
        working-directory: ./src
        run: dotnet restore

      - name: Build
        working-directory: ./src
        run: dotnet build ./BssFramework.slnx --no-restore

      - name: NHibernate Integration Tests
        run: dotnet test src/_SampleSystem/_Tests/SampleSystem.IntegrationTests.NHibernate --no-build --verbosity normal

      - name: NHibernate Integration Tests Xunit
        run: dotnet test src/_SampleSystem/_Tests/SampleSystem.IntegrationTests.Xunit.NHibernate --no-build --verbosity normal